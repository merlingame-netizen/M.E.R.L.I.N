<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M.E.R.L.I.N. — Le Jeu des Runes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; touch-action: none; }

    /* ── C163: Global CRT Aesthetic ─────────────────────────────────────── */
    /* Persistent scan-line overlay across entire viewport */
    #crt-scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 9996;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.10) 2px, rgba(0,0,0,0.10) 4px
      );
    }
    /* Phosphor vignette — dark corners, slight centre glow */
    #crt-vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 9995;
      background: radial-gradient(ellipse at 50% 50%,
        transparent 30%, rgba(0,0,0,0.55) 100%
      );
    }
    /* CRT glitch: horizontal tear + chromatic shift, fires every ~6s */
    @keyframes crt-glitch {
      0%,88%,100% { clip-path:none; transform:translate(0);  filter:none; }
      90%  { clip-path:inset(38% 0 56% 0); transform:translate(-3px,0); filter:hue-rotate(25deg) saturate(1.6); }
      91%  { clip-path:inset(56% 0 24% 0); transform:translate( 3px,0); filter:hue-rotate(-20deg); }
      92%  { clip-path:none;               transform:translate(-1px,0); filter:none; }
      93%  { clip-path:inset(10% 0 80% 0); transform:translate( 2px,0); filter:hue-rotate(15deg); }
      94%  { clip-path:none;               transform:translate(0); filter:none; }
    }
    @keyframes crt-title-flicker {
      0%,85%,100% { opacity:1; text-shadow: 0 0 28px rgba(51,255,102,0.55), 0 2px 8px rgba(0,0,0,0.8); }
      87% { opacity:0.7; text-shadow: 2px 0 0 rgba(255,0,80,0.6), -2px 0 0 rgba(0,200,255,0.6); }
      88% { opacity:1; }
      93% { opacity:0.85; text-shadow: -2px 0 0 rgba(255,0,80,0.4), 2px 0 0 rgba(0,200,255,0.4); }
      94% { opacity:1; }
    }
    .crt-glitch-layer { animation: crt-glitch 7s steps(1) infinite; }

    /* ── Boot Screen (T060 — legacy, hidden; CeltOS overlay handles first visual) ── */
    #boot-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #000;
      z-index: 9999;
      font-family: 'Courier New', Courier, monospace;
      color: #33ff66;
      transition: opacity 0.8s ease;
      overflow: hidden;
    }
    #boot-screen.hidden { opacity: 0; pointer-events: none; }
    .boot-logo {
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
    }
    .boot-title {
      font-size: 28px;
      letter-spacing: 8px;
      font-weight: 300;
      color: rgba(51,255,102,0.92);
      text-shadow: 0 0 18px rgba(51,255,102,0.40);
      margin-bottom: 8px;
    }
    .boot-subtitle {
      font-size: 11px;
      letter-spacing: 3px;
      opacity: 0.55;
      color: rgba(51,255,102,0.70);
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .boot-progress-track {
      width: 280px;
      height: 2px;
      background: rgba(51,255,102,0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    .boot-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0a3318, #1a8833, #33ff66);
      border-radius: 2px;
      width: 0%;
      animation: boot-load 2.5s ease-in-out forwards;
    }
    @keyframes boot-load {
      0%   { width: 0%; }
      20%  { width: 15%; }
      50%  { width: 45%; }
      75%  { width: 72%; }
      90%  { width: 88%; }
      100% { width: 100%; }
    }
    .boot-status {
      margin-top: 16px;
      font-size: 11px;
      letter-spacing: 2px;
      opacity: 0.35;
      text-transform: uppercase;
    }

    /* ── Main Menu Overlay (C168: left-panel CeltOS layout) ── */
    #main-menu-overlay {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 40%;
      min-width: 280px;
      max-width: 440px;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      z-index: 90;
      padding: 0 40px 0 52px;
      background: linear-gradient(to right, rgba(3,5,7,0.88) 0%, rgba(2,4,6,0.70) 65%, transparent 100%);
      pointer-events: none;
    }
    #main-menu-overlay.visible { display: flex; pointer-events: all; }
    .menu-title-block {
      text-align: left;
      margin-bottom: 52px;
    }
    .menu-title-block h1 {
      font-family: 'Courier New', Courier, monospace;
      font-size: 44px;
      letter-spacing: 8px;
      font-weight: 700;
      color: #33ff66;
      text-shadow: 0 0 28px rgba(51,255,102,0.55), 0 2px 8px rgba(0,0,0,0.8);
      animation: crt-title-flicker 7s steps(1) infinite;
    }
    .menu-title-block p {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      letter-spacing: 5px;
      color: #1a8833;
      opacity: 0.9;
      margin-top: 8px;
      text-transform: uppercase;
    }
    /* C168: CRT separator line under title */
    .menu-title-block::after {
      content: '';
      display: block;
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, rgba(51,255,102,0.5) 0%, transparent 100%);
      margin-top: 20px;
    }
    /* C168: CRT-style menu buttons — left-aligned phosphor green terminal */
    /* C163: CRT-style menu buttons — CeltOS phosphor green terminal */
    #menu-start-btn {
      padding: 14px 40px;
      background: rgba(2, 10, 4, 0.92);
      border: 1px solid rgba(51,255,102,0.3);
      border-left: 3px solid rgba(51,255,102,0.9);
      border-radius: 0 2px 2px 0;
      color: rgba(51,255,102,0.85);
      font-size: 13px;
      letter-spacing: 5px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: Courier New,monospace;
      transition: all 0.2s ease;
      text-shadow: 0 0 8px rgba(51,255,102,0.5);
      box-shadow: inset 0 0 12px rgba(0,0,0,0.6);
      width: 100%;
      text-align: left;
    }
    #menu-start-btn:hover {
      background: rgba(4, 20, 8, 0.95);
      border-color: rgba(51,255,102,0.7);
      border-left-color: rgba(51,255,102,1.0);
      box-shadow: 0 0 12px rgba(51,255,102,0.15), inset 0 0 8px rgba(51,255,102,0.08);
      text-shadow: 0 0 12px rgba(51,255,102,0.85);
      padding-left: 48px;
    }
    #menu-continue-btn {
      display: none; /* shown only when save exists */
      padding: 12px 40px;
      background: rgba(1, 8, 2, 0.88);
      border: 1px solid rgba(51,255,102,0.3);
      border-left: 3px solid rgba(51,255,102,0.7);
      border-radius: 0 2px 2px 0;
      color: rgba(51,255,102,0.85);
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: Courier New,monospace;
      transition: all 0.2s ease;
      margin-top: 10px;
      text-shadow: 0 0 6px rgba(51,255,102,0.35);
      width: 100%;
      text-align: left;
    }
    #menu-continue-btn:hover {
      background: rgba(4, 20, 8, 0.95);
      border-color: rgba(51,255,102,0.7);
      border-left-color: rgba(51,255,102,1.0);
      box-shadow: 0 0 12px rgba(51,255,102,0.15);
      text-shadow: 0 0 10px rgba(51,255,102,0.75);
      padding-left: 48px;
    }
    .menu-btn-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 100%;
    }
    /* C168: CeltOS system info at bottom of panel */
    .menu-sys-info {
      position: absolute;
      bottom: 28px;
      left: 52px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      color: rgba(51,255,102,0.28);
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1.8;
      pointer-events: none;
    }
    #menu-canvas-wrapper {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 85;
      display: none;
    }
    #menu-canvas-wrapper.visible { display: block; }

    /* ── Merlin's Lair Canvas Wrapper (T062) ── */
    #lair-canvas-wrapper {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 85;
      display: none;
    }
    #lair-canvas-wrapper.visible { display: block; }

    /* ── Lair Zone Tooltip — C170: CeltOS style ── */
    #lair-tooltip {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 28px;
      background: rgba(3, 8, 5, 0.90);
      border: 1px solid rgba(51,255,102,0.45);
      border-left: 3px solid rgba(51,255,102,0.8);
      border-radius: 0 2px 2px 0;
      color: #33ff66;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(51,255,102,0.5);
      pointer-events: none;
      z-index: 90;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #lair-tooltip.visible { opacity: 1; }

    /* HUD overlay — C170: CeltOS/CRT charter */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 10;
      font-family: 'Courier New', Courier, monospace;
      color: #33ff66;
      background: linear-gradient(to bottom, rgba(3,5,7,0.65) 0%, transparent 100%);
    }
    #hud .life-bar {
      width: 180px; height: 8px;
      background: rgba(0,15,5,0.7);
      border: 1px solid rgba(51,255,102,0.4);
      border-radius: 0;
      overflow: hidden;
    }
    #hud .life-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #1a8833, #33ff66);
      border-radius: 0;
      transition: width 0.5s ease;
      box-shadow: 0 0 6px rgba(51,255,102,0.4);
    }
    #hud .life-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(51,255,102,0.6);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #hud .info {
      font-size: 11px;
      letter-spacing: 2px;
      opacity: 0.7;
      text-transform: uppercase;
      text-shadow: 0 0 6px rgba(51,255,102,0.4);
    }

    /* ── Card overlay (T067: parchment card redesign) ── */
    #card-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(5, 4, 8, 0.92);
      z-index: 20;
      font-family: 'Courier New', Courier, monospace;
    }
    #card-overlay.visible { display: flex; }

    .card-container {
      max-width: 680px;
      width: 92%;
      padding: 36px 32px 32px;
      background: rgba(1,8,2,0.97);
      border: 1px solid rgba(51,255,102,0.18);
      border-left: 3px solid #1a8833;
      border-radius: 4px;
      color: rgba(51,255,102,0.88);
      position: relative;
      box-shadow:
        0 0 0 1px rgba(51,255,102,0.06),
        inset 0 0 60px rgba(0,0,0,0.5),
        0 8px 40px rgba(0,0,0,0.8);
    }
    /* CRT corner accents */
    .card-container::before,
    .card-container::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: #1a8833;
      border-style: solid;
      opacity: 0.7;
    }
    .card-container::before {
      top: 8px; left: 8px;
      border-width: 2px 0 0 2px;
      border-radius: 4px 0 0 0;
    }
    .card-container::after {
      bottom: 8px; right: 8px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 4px 0;
    }
    /* Biome badge top-right */
    .card-biome-badge {
      position: absolute;
      top: 12px; right: 16px;
      font-family: Courier New,monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(51,255,102,0.60);
      opacity: 0.90;
      padding: 3px 8px;
      border: 1px solid rgba(51,255,102,0.20);
      border-radius: 2px;
      background: rgba(0,0,0,0.3);
    }
    /* CRT terminal separator */
    .card-divider {
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(51,255,102,0.30), transparent);
      margin: 0 auto 24px;
    }
    .card-narrative {
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 28px;
      font-style: normal;
      text-align: center;
      color: rgba(51,255,102,0.85);
      text-shadow: 0 0 8px rgba(51,255,102,0.20);
    }
    .card-options {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .card-option {
      flex: 1;
      min-width: 160px;
      max-width: 210px;
      padding: 14px 12px;
      background: rgba(1,8,2,0.80);
      border: 1px solid rgba(51,255,102,0.18);
      border-radius: 2px;
      cursor: pointer;
      text-align: center;
      transition: all 0.25s ease;
      pointer-events: all;
      position: relative;
    }
    .card-option:hover {
      background: rgba(5,20,8,0.95);
      border-color: rgba(51,255,102,0.55);
      transform: translateY(-2px);
      box-shadow: 0 0 14px rgba(51,255,102,0.12), inset 0 0 10px rgba(51,255,102,0.04);
    }
    .card-option .verb {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      font-size: 13px;
      margin-bottom: 7px;
      color: #33ff66;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow: 0 0 6px rgba(51,255,102,0.30);
    }
    .card-option .desc {
      font-size: 11px;
      opacity: 0.75;
      color: rgba(51,255,102,0.60);
      line-height: 1.4;
    }
    /* Faction dot indicator */
    .card-option .faction-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
      opacity: 0.8;
    }
    /* Effect preview tooltip (T068) */
    .effect-tooltip {
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      min-width: 140px;
      max-width: 180px;
      padding: 10px 12px;
      background: rgba(1,8,2,0.96);
      border: 1px solid rgba(51,255,102,0.22);
      border-radius: 2px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.7);
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      white-space: nowrap;
    }
    .card-option:hover .effect-tooltip {
      opacity: 1;
    }
    /* C142/COLL: reveal_all_options — coll ogham makes all effect tooltips permanently visible */
    .card-option.effects-revealed .effect-tooltip {
      opacity: 1;
      border-color: rgba(80,180,255,0.55);
      box-shadow: 0 4px 20px rgba(0,0,0,0.7), 0 0 8px rgba(80,180,255,0.25);
    }
    /* On narrow screens: tooltip goes below */
    @media (max-width: 700px) {
      .effect-tooltip {
        left: 50%;
        top: calc(100% + 8px);
        transform: translateX(-50%);
      }
    }
    .effect-tooltip .effect-line {
      font-size: 11px;
      line-height: 1.8;
      color: rgba(51,255,102,0.65);
    }
    .effect-tooltip .effect-pos { color: #7dce82; }
    .effect-tooltip .effect-neg { color: #e05c5c; }
    .effect-tooltip .effect-neu { color: rgba(51,255,102,0.55); }

    /* T073: Card selection CRT flash */
    .card-option-selected {
      background: rgba(26,136,51,0.25) !important;
      border-color: rgba(51,255,102,0.70) !important;
      transition: none !important;
    }

    /* T071: Mobile card layout — stack vertically on narrow viewports */
    @media (max-width: 560px) {
      .card-options {
        flex-direction: column;
      }
      .card-option {
        max-width: 100%;
        min-width: unset;
      }
    }

    /* T059: Mobile minigame canvas — prevent overflow on 375px viewport */
    #minigame-container canvas {
      max-width: 100%;
      max-height: 60vh;
    }
    @media (max-width: 390px) {
      #minigame-container .minigame-title {
        font-size: 14px;
        letter-spacing: 1px;
      }
      #minigame-container {
        padding: 0 8px;
        box-sizing: border-box;
      }
    }

    /* Minigame overlay */
    #minigame-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(5, 8, 18, 0.93);
      z-index: 30;
      font-family: 'Courier New', Courier, monospace;
      color: rgba(51,255,102,0.88);
    }
    #minigame-overlay.visible { display: flex; }

    /* Fade transition */
    #fade-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0a0a12;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      z-index: 50;
    }
    #fade-overlay.active { opacity: 1; }

    /* Loading screen — C170: CeltOS charter */
    #loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #030507;
      color: #33ff66;
      font-family: 'Courier New', Courier, monospace;
      z-index: 100;
    }
    #loading h1 {
      font-size: 28px; margin-bottom: 6px; letter-spacing: 8px;
      text-shadow: 0 0 20px rgba(51,255,102,0.4);
    }
    #loading p { font-size: 11px; opacity: 0.55; letter-spacing: 4px; text-transform: uppercase; }
    #loading .spinner {
      width: 48px; height: 48px;
      margin-top: 28px;
      position: relative;
    }
    #loading .spinner::before,
    #loading .spinner::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 2px solid transparent;
      border-radius: 50%;
    }
    #loading .spinner::before {
      border-top-color: #33ff66;
      border-bottom-color: #33ff66;
      animation: spin 1.2s linear infinite;
    }
    #loading .spinner::after {
      border-left-color: rgba(51,255,102,0.35);
      border-right-color: rgba(51,255,102,0.35);
      animation: spin 1.8s linear infinite reverse;
      width: 80%; height: 80%;
      top: 10%; left: 10%;
    }
    #loading .loading-status {
      margin-top: 14px;
      font-size: 10px;
      opacity: 0.45;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes spin-slow { to { transform: rotate(360deg); } }

    /* LLM loading hint — C170: CeltOS charter */
    .llm-loading-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(3,8,5,0.90);
      color: rgba(51,255,102,0.8);
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      padding: 8px 20px;
      border-radius: 0;
      border: 1px solid rgba(51,255,102,0.35);
      border-left: 2px solid rgba(51,255,102,0.7);
      z-index: 60;
      pointer-events: none;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* T047: Card flip animation — rotateY 0->90 (hide front) then 0->0 (reveal content) */
    .card-container {
      perspective: 1000px;
    }
    @keyframes card-flip-in {
      0%   { transform: rotateY(0deg);   opacity: 1; }
      45%  { transform: rotateY(90deg);  opacity: 0; }
      55%  { transform: rotateY(-90deg); opacity: 0; }
      100% { transform: rotateY(0deg);   opacity: 1; }
    }
    .card-flip {
      animation: card-flip-in 0.4s ease-in-out forwards;
    }
  </style>
</head>
<body>
  <!-- Boot screen removed — intro skipped, direct to menu -->
  <!-- C163: CRT persistent overlays — pointer-events:none, always on top of game content -->
  <div id="crt-scanlines" aria-hidden="true"></div>
  <div id="crt-vignette" aria-hidden="true"></div>

  <div id="app" class="crt-glitch-layer">
    <!-- Main Menu Canvas Wrapper (Three.js cinematic) -->
    <div id="menu-canvas-wrapper"></div>
    <!-- Merlin's Lair Canvas Wrapper (T062) -->
    <div id="lair-canvas-wrapper"></div>
    <!-- Lair zone hover tooltip -->
    <div id="lair-tooltip"></div>
    <!-- Main Menu UI Overlay (C168: left-panel CeltOS layout) -->
    <div id="main-menu-overlay">
      <div class="menu-title-block">
        <h1>M.E.R.L.I.N.</h1>
        <p>Le Jeu des Runes</p>
      </div>
      <div class="menu-btn-group">
        <button id="menu-start-btn">&gt; NOUVELLE PARTIE</button>
        <button id="menu-continue-btn">&gt; CONTINUER</button>
      </div>
      <div class="menu-sys-info" aria-hidden="true">
        CeltOS v2.4 — druid_core.ko<br>
        M.E.R.L.I.N.-3B :: READY
      </div>
    </div>
    <div id="loading">
      <h1>M.E.R.L.I.N.</h1>
      <p>Le Jeu des Runes</p>
      <div class="spinner"></div>
      <div class="loading-status">Chargement du monde...</div>
    </div>
    <div id="hud">
      <div>
        <div class="life-label">VIE</div>
        <div class="life-bar" id="life-bar-container" role="progressbar" aria-label="Points de vie" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100">
          <div class="life-bar-fill" id="life-fill" style="width: 100%"></div>
        </div>
        <div id="life-status" aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;"></div>
      </div>
      <div class="info" id="cards-count">CARTE_0</div>
      <div class="info" id="biome-name">BROCELIANDE</div>
    </div>
    <div id="card-overlay">
      <div class="card-container">
        <div class="card-narrative" id="card-text"></div>
        <div class="card-options" id="card-options"></div>
      </div>
    </div>
    <div id="minigame-overlay">
      <div id="minigame-container"></div>
    </div>
    <div id="fade-overlay"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

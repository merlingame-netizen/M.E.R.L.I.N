<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M.E.R.L.I.N. — Le Jeu des Oghams</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; touch-action: none; }

    /* ── Boot Screen (T060) ── */
    #boot-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #0a0a12;
      z-index: 200;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #cd853f;
      transition: opacity 0.8s ease;
    }
    #boot-screen.hidden { opacity: 0; pointer-events: none; }
    .boot-logo {
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
    }
    .boot-title {
      font-size: 36px;
      letter-spacing: 8px;
      font-weight: 300;
      color: #e8dcc8;
      margin-bottom: 8px;
    }
    .boot-subtitle {
      font-size: 13px;
      letter-spacing: 3px;
      opacity: 0.5;
      color: #cd853f;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .boot-progress-track {
      width: 280px;
      height: 2px;
      background: rgba(205,133,63,0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    .boot-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b4513, #cd853f, #f4c97a);
      border-radius: 2px;
      width: 0%;
      animation: boot-load 2.5s ease-in-out forwards;
    }
    @keyframes boot-load {
      0%   { width: 0%; }
      20%  { width: 15%; }
      50%  { width: 45%; }
      75%  { width: 72%; }
      90%  { width: 88%; }
      100% { width: 100%; }
    }
    .boot-status {
      margin-top: 16px;
      font-size: 11px;
      letter-spacing: 2px;
      opacity: 0.35;
      text-transform: uppercase;
    }

    /* ── Main Menu Overlay (T061) ── */
    #main-menu-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      z-index: 90;
      padding-bottom: 80px;
      background: transparent;
      pointer-events: none;
    }
    #main-menu-overlay.visible { display: flex; pointer-events: all; }
    .menu-title-block {
      text-align: center;
      margin-bottom: 48px;
    }
    .menu-title-block h1 {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 52px;
      letter-spacing: 12px;
      font-weight: 200;
      color: #e8dcc8;
      text-shadow: 0 0 40px rgba(205,133,63,0.6), 0 2px 8px rgba(0,0,0,0.8);
    }
    .menu-title-block p {
      font-size: 14px;
      letter-spacing: 4px;
      color: #cd853f;
      opacity: 0.7;
      margin-top: 8px;
    }
    #menu-start-btn {
      padding: 16px 56px;
      background: rgba(139,69,19,0.15);
      border: 1px solid rgba(205,133,63,0.5);
      border-radius: 4px;
      color: #e8dcc8;
      font-size: 16px;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Segoe UI', system-ui, sans-serif;
      transition: all 0.4s ease;
      backdrop-filter: blur(4px);
    }
    #menu-start-btn:hover {
      background: rgba(139,69,19,0.35);
      border-color: rgba(205,133,63,0.9);
      box-shadow: 0 0 30px rgba(205,133,63,0.3);
    }
    #menu-canvas-wrapper {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 85;
      display: none;
    }
    #menu-canvas-wrapper.visible { display: block; }

    /* ── Merlin's Lair Canvas Wrapper (T062) ── */
    #lair-canvas-wrapper {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 85;
      display: none;
    }
    #lair-canvas-wrapper.visible { display: block; }

    /* ── Lair Zone Tooltip ── */
    #lair-tooltip {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 28px;
      background: rgba(10, 8, 5, 0.82);
      border: 1px solid rgba(205,133,63,0.4);
      border-radius: 6px;
      color: #e8dcc8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 90;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #lair-tooltip.visible { opacity: 1; }

    /* HUD overlay */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 10;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8dcc8;
    }
    #hud .life-bar {
      width: 200px; height: 12px;
      background: rgba(0,0,0,0.5);
      border-radius: 6px;
      border: 1px solid rgba(232,220,200,0.3);
      overflow: hidden;
    }
    #hud .life-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b4513, #cd853f);
      border-radius: 6px;
      transition: width 0.5s ease;
    }
    #hud .info { font-size: 14px; opacity: 0.8; }

    /* Card overlay */
    #card-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(10, 10, 18, 0.85);
      z-index: 20;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #card-overlay.visible { display: flex; }

    .card-container {
      max-width: 700px;
      width: 90%;
      padding: 40px;
      background: linear-gradient(145deg, rgba(30,25,20,0.95), rgba(15,12,10,0.98));
      border: 1px solid rgba(205,133,63,0.3);
      border-radius: 16px;
      color: #e8dcc8;
    }
    .card-narrative {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 32px;
      font-style: italic;
      text-align: center;
    }
    .card-options {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .card-option {
      flex: 1;
      max-width: 200px;
      padding: 16px;
      background: rgba(139,69,19,0.15);
      border: 1px solid rgba(205,133,63,0.4);
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s ease;
      pointer-events: all;
    }
    .card-option:hover {
      background: rgba(139,69,19,0.35);
      border-color: rgba(205,133,63,0.8);
      transform: translateY(-2px);
    }
    .card-option .verb { font-weight: bold; font-size: 16px; margin-bottom: 8px; }
    .card-option .desc { font-size: 13px; opacity: 0.7; }

    /* Minigame overlay */
    #minigame-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(10, 10, 18, 0.9);
      z-index: 30;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8dcc8;
    }
    #minigame-overlay.visible { display: flex; }

    /* Fade transition */
    #fade-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0a0a12;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      z-index: 50;
    }
    #fade-overlay.active { opacity: 1; }

    /* Loading screen */
    #loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #0a0a12;
      color: #e8dcc8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      z-index: 100;
    }
    #loading h1 { font-size: 32px; margin-bottom: 8px; letter-spacing: 4px; }
    #loading p { font-size: 14px; opacity: 0.6; }
    #loading .spinner {
      width: 64px; height: 64px;
      margin-top: 32px;
      position: relative;
    }
    #loading .spinner::before,
    #loading .spinner::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 3px solid transparent;
      border-radius: 50%;
    }
    #loading .spinner::before {
      border-top-color: #cd853f;
      border-bottom-color: #cd853f;
      animation: spin 1.2s linear infinite;
    }
    #loading .spinner::after {
      border-left-color: rgba(205,133,63,0.4);
      border-right-color: rgba(205,133,63,0.4);
      animation: spin 1.8s linear infinite reverse;
      width: 80%; height: 80%;
      top: 10%; left: 10%;
    }
    #loading .loading-status {
      margin-top: 16px;
      font-size: 12px;
      opacity: 0.4;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes spin-slow { to { transform: rotate(360deg); } }

    /* T047: Card flip animation — rotateY 0->90 (hide front) then 0->0 (reveal content) */
    .card-container {
      perspective: 1000px;
    }
    @keyframes card-flip-in {
      0%   { transform: rotateY(0deg);   opacity: 1; }
      45%  { transform: rotateY(90deg);  opacity: 0; }
      55%  { transform: rotateY(-90deg); opacity: 0; }
      100% { transform: rotateY(0deg);   opacity: 1; }
    }
    .card-flip {
      animation: card-flip-in 0.4s ease-in-out forwards;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Boot Screen T060 -->
    <div id="boot-screen">
      <svg class="boot-logo" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Celtic knot: interlaced triquetra-inspired design -->
        <circle cx="60" cy="60" r="54" stroke="rgba(205,133,63,0.15)" stroke-width="1"/>
        <circle cx="60" cy="60" r="46" stroke="rgba(205,133,63,0.08)" stroke-width="1"/>
        <!-- Outer ring with ticks -->
        <circle cx="60" cy="60" r="52" stroke="#cd853f" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.5"
          style="animation: spin-slow 20s linear infinite; transform-origin: 60px 60px;"/>
        <!-- Celtic triquetra knot paths -->
        <path d="M60 20 C72 28, 88 32, 92 48 C96 64, 84 76, 72 80 C84 84, 94 94, 84 104 C74 114, 60 108, 60 96"
          stroke="#cd853f" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
        <path d="M60 20 C48 28, 32 32, 28 48 C24 64, 36 76, 48 80 C36 84, 26 94, 36 104 C46 114, 60 108, 60 96"
          stroke="#cd853f" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
        <path d="M60 96 C60 84, 52 72, 48 80 C44 88, 50 100, 60 104 C70 100, 76 88, 72 80 C68 72, 60 84, 60 96"
          stroke="#f4c97a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
        <!-- Center circle -->
        <circle cx="60" cy="60" r="6" fill="#cd853f" opacity="0.8"/>
        <circle cx="60" cy="60" r="3" fill="#f4c97a"/>
        <!-- Ogham marks -->
        <line x1="60" y1="6" x2="60" y2="14" stroke="#cd853f" stroke-width="2" opacity="0.6"/>
        <line x1="112" y1="60" x2="114" y2="60" stroke="#cd853f" stroke-width="2" opacity="0.6"/>
        <line x1="6" y1="60" x2="8" y2="60" stroke="#cd853f" stroke-width="2" opacity="0.6"/>
        <line x1="60" y1="106" x2="60" y2="114" stroke="#cd853f" stroke-width="2" opacity="0.6"/>
      </svg>
      <div class="boot-title">M.E.R.L.I.N.</div>
      <div class="boot-subtitle">Le Jeu des Oghams</div>
      <div class="boot-progress-track">
        <div class="boot-progress-fill"></div>
      </div>
      <div class="boot-status" id="boot-status-text">Initialisation...</div>
    </div>
    <!-- Main Menu Canvas Wrapper (Three.js cinematic) -->
    <div id="menu-canvas-wrapper"></div>
    <!-- Merlin's Lair Canvas Wrapper (T062) -->
    <div id="lair-canvas-wrapper"></div>
    <!-- Lair zone hover tooltip -->
    <div id="lair-tooltip"></div>
    <!-- Main Menu UI Overlay -->
    <div id="main-menu-overlay">
      <div class="menu-title-block">
        <h1>M.E.R.L.I.N.</h1>
        <p>Le Jeu des Oghams</p>
      </div>
      <button id="menu-start-btn">Commencer le Voyage</button>
    </div>
    <div id="loading">
      <h1>M.E.R.L.I.N.</h1>
      <p>Le Jeu des Oghams</p>
      <div class="spinner"></div>
      <div class="loading-status">Chargement du monde...</div>
    </div>
    <div id="hud">
      <div>
        <div class="info">Vie</div>
        <div class="life-bar">
          <div class="life-bar-fill" id="life-fill" style="width: 100%"></div>
        </div>
      </div>
      <div class="info" id="cards-count">Carte 0</div>
      <div class="info" id="biome-name">Foret de Broceliande</div>
    </div>
    <div id="card-overlay">
      <div class="card-container">
        <div class="card-narrative" id="card-text"></div>
        <div class="card-options" id="card-options"></div>
      </div>
    </div>
    <div id="minigame-overlay">
      <div id="minigame-container"></div>
    </div>
    <div id="fade-overlay"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

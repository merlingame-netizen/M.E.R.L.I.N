<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M.E.R.L.I.N. — Le Jeu des Oghams</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; touch-action: none; }

    /* ── C163: Global CRT Aesthetic ─────────────────────────────────────── */
    /* Persistent scan-line overlay across entire viewport */
    #crt-scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 9996;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.10) 2px, rgba(0,0,0,0.10) 4px
      );
    }
    /* Phosphor vignette — dark corners, slight centre glow */
    #crt-vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 9995;
      background: radial-gradient(ellipse at 50% 50%,
        transparent 30%, rgba(0,0,0,0.55) 100%
      );
    }
    /* CRT glitch: horizontal tear + chromatic shift, fires every ~6s */
    @keyframes crt-glitch {
      0%,88%,100% { clip-path:none; transform:translate(0);  filter:none; }
      90%  { clip-path:inset(38% 0 56% 0); transform:translate(-3px,0); filter:hue-rotate(25deg) saturate(1.6); }
      91%  { clip-path:inset(56% 0 24% 0); transform:translate( 3px,0); filter:hue-rotate(-20deg); }
      92%  { clip-path:none;               transform:translate(-1px,0); filter:none; }
      93%  { clip-path:inset(10% 0 80% 0); transform:translate( 2px,0); filter:hue-rotate(15deg); }
      94%  { clip-path:none;               transform:translate(0); filter:none; }
    }
    @keyframes crt-title-flicker {
      0%,85%,100% { opacity:1; text-shadow: 0 0 28px rgba(51,255,102,0.55), 0 2px 8px rgba(0,0,0,0.8); }
      87% { opacity:0.7; text-shadow: 2px 0 0 rgba(255,0,80,0.6), -2px 0 0 rgba(0,200,255,0.6); }
      88% { opacity:1; }
      93% { opacity:0.85; text-shadow: -2px 0 0 rgba(255,0,80,0.4), 2px 0 0 rgba(0,200,255,0.4); }
      94% { opacity:1; }
    }
    .crt-glitch-layer { animation: crt-glitch 7s steps(1) infinite; }

    /* ── Boot Screen (T060) ── */
    #boot-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #000;
      z-index: 9999;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #cd853f;
      transition: opacity 0.8s ease;
      overflow: hidden;
    }
    #boot-screen.hidden { opacity: 0; pointer-events: none; }
    .boot-logo {
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
    }
    .boot-title {
      font-size: 36px;
      letter-spacing: 8px;
      font-weight: 300;
      color: #e8dcc8;
      margin-bottom: 8px;
    }
    .boot-subtitle {
      font-size: 13px;
      letter-spacing: 3px;
      opacity: 0.5;
      color: #cd853f;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .boot-progress-track {
      width: 280px;
      height: 2px;
      background: rgba(205,133,63,0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    .boot-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b4513, #cd853f, #f4c97a);
      border-radius: 2px;
      width: 0%;
      animation: boot-load 2.5s ease-in-out forwards;
    }
    @keyframes boot-load {
      0%   { width: 0%; }
      20%  { width: 15%; }
      50%  { width: 45%; }
      75%  { width: 72%; }
      90%  { width: 88%; }
      100% { width: 100%; }
    }
    .boot-status {
      margin-top: 16px;
      font-size: 11px;
      letter-spacing: 2px;
      opacity: 0.35;
      text-transform: uppercase;
    }

    /* ── Main Menu Overlay (T061) ── */
    #main-menu-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      z-index: 90;
      padding-bottom: 80px;
      background: transparent;
      pointer-events: none;
    }
    #main-menu-overlay.visible { display: flex; pointer-events: all; }
    .menu-title-block {
      text-align: center;
      margin-bottom: 48px;
    }
    .menu-title-block h1 {
      font-family: 'Courier New', Courier, monospace;
      font-size: 52px;
      letter-spacing: 12px;
      font-weight: 700;
      color: #33ff66;
      text-shadow: 0 0 28px rgba(51,255,102,0.55), 0 2px 8px rgba(0,0,0,0.8);
      animation: crt-title-flicker 7s steps(1) infinite;
    }
    .menu-title-block p {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 5px;
      color: #1a8833;
      opacity: 0.9;
      margin-top: 8px;
      text-transform: uppercase;
    }
    /* C163: CRT-style menu buttons — phosphor green terminal aesthetic */
    #menu-start-btn {
      padding: 14px 56px;
      background: rgba(0, 30, 10, 0.7);
      border: 1px solid rgba(51,255,102,0.65);
      border-radius: 2px;
      color: #33ff66;
      font-size: 14px;
      letter-spacing: 5px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Courier New', Courier, monospace;
      transition: all 0.2s ease;
      text-shadow: 0 0 8px rgba(51,255,102,0.5);
      box-shadow: inset 0 0 12px rgba(0,0,0,0.6), 0 0 0 0 rgba(51,255,102,0);
    }
    #menu-start-btn:hover {
      background: rgba(0, 50, 15, 0.85);
      border-color: rgba(51,255,102,1.0);
      box-shadow: 0 0 22px rgba(51,255,102,0.28), inset 0 0 8px rgba(51,255,102,0.08);
      text-shadow: 0 0 12px rgba(51,255,102,0.85);
    }
    #menu-continue-btn {
      display: none; /* shown only when save exists */
      padding: 12px 48px;
      background: rgba(0, 20, 8, 0.7);
      border: 1px solid rgba(51,200,102,0.45);
      border-radius: 2px;
      color: rgba(51,200,102,0.9);
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Courier New', Courier, monospace;
      transition: all 0.2s ease;
      margin-top: 10px;
      text-shadow: 0 0 6px rgba(51,200,102,0.4);
    }
    #menu-continue-btn:hover {
      background: rgba(0, 40, 12, 0.85);
      border-color: rgba(51,200,102,0.85);
      box-shadow: 0 0 16px rgba(51,200,102,0.22);
      text-shadow: 0 0 10px rgba(51,200,102,0.75);
    }
    .menu-btn-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #menu-canvas-wrapper {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 85;
      display: none;
    }
    #menu-canvas-wrapper.visible { display: block; }

    /* ── Merlin's Lair Canvas Wrapper (T062) ── */
    #lair-canvas-wrapper {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 85;
      display: none;
    }
    #lair-canvas-wrapper.visible { display: block; }

    /* ── Lair Zone Tooltip ── */
    #lair-tooltip {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 28px;
      background: rgba(10, 8, 5, 0.82);
      border: 1px solid rgba(205,133,63,0.4);
      border-radius: 6px;
      color: #e8dcc8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 90;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #lair-tooltip.visible { opacity: 1; }

    /* HUD overlay */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 10;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8dcc8;
    }
    #hud .life-bar {
      width: 200px; height: 12px;
      background: rgba(0,0,0,0.5);
      border-radius: 6px;
      border: 1px solid rgba(232,220,200,0.3);
      overflow: hidden;
    }
    #hud .life-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b4513, #cd853f);
      border-radius: 6px;
      transition: width 0.5s ease;
    }
    #hud .info { font-size: 14px; opacity: 0.8; }

    /* ── Card overlay (T067: parchment card redesign) ── */
    #card-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(5, 4, 8, 0.92);
      z-index: 20;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #card-overlay.visible { display: flex; }

    .card-container {
      max-width: 680px;
      width: 92%;
      padding: 36px 32px 32px;
      background: linear-gradient(145deg, #1a1209, #2d1f0e, #1a1209);
      border: 2px solid rgba(201,168,76,0.45);
      border-radius: 12px;
      color: #f5e6c8;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.12),
        inset 0 0 60px rgba(0,0,0,0.5),
        0 8px 40px rgba(0,0,0,0.8);
    }
    /* Celtic corner accents */
    .card-container::before,
    .card-container::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: #c9a84c;
      border-style: solid;
      opacity: 0.6;
    }
    .card-container::before {
      top: 8px; left: 8px;
      border-width: 2px 0 0 2px;
      border-radius: 4px 0 0 0;
    }
    .card-container::after {
      bottom: 8px; right: 8px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 4px 0;
    }
    /* Biome badge top-right */
    .card-biome-badge {
      position: absolute;
      top: 12px; right: 16px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c9a84c;
      opacity: 0.65;
      padding: 3px 8px;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 10px;
      background: rgba(0,0,0,0.3);
    }
    /* Decorative gold top-line separator */
    .card-divider {
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5), transparent);
      margin: 0 auto 24px;
    }
    .card-narrative {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 17px;
      line-height: 1.7;
      margin-bottom: 28px;
      font-style: italic;
      text-align: center;
      color: #f5e6c8;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }
    .card-options {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .card-option {
      flex: 1;
      min-width: 160px;
      max-width: 210px;
      padding: 14px 12px;
      background: rgba(10, 7, 3, 0.7);
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.25s ease;
      pointer-events: all;
      position: relative;
    }
    .card-option:hover {
      background: rgba(35, 22, 6, 0.9);
      border-color: rgba(201,168,76,0.85);
      transform: translateY(-3px);
      box-shadow: 0 0 18px rgba(201,168,76,0.2), inset 0 0 12px rgba(201,168,76,0.05);
    }
    .card-option .verb {
      font-family: Georgia, serif;
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 7px;
      color: #c9a84c;
      letter-spacing: 0.5px;
    }
    .card-option .desc {
      font-size: 12px;
      opacity: 0.75;
      color: #e8d4aa;
      line-height: 1.4;
    }
    /* Faction dot indicator */
    .card-option .faction-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
      opacity: 0.8;
    }
    /* Effect preview tooltip (T068) */
    .effect-tooltip {
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      min-width: 140px;
      max-width: 180px;
      padding: 10px 12px;
      background: rgba(10, 7, 3, 0.96);
      border: 1px solid rgba(201,168,76,0.45);
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.7);
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      white-space: nowrap;
    }
    .card-option:hover .effect-tooltip {
      opacity: 1;
    }
    /* C142/COLL: reveal_all_options — coll ogham makes all effect tooltips permanently visible */
    .card-option.effects-revealed .effect-tooltip {
      opacity: 1;
      border-color: rgba(80,180,255,0.55);
      box-shadow: 0 4px 20px rgba(0,0,0,0.7), 0 0 8px rgba(80,180,255,0.25);
    }
    /* On narrow screens: tooltip goes below */
    @media (max-width: 700px) {
      .effect-tooltip {
        left: 50%;
        top: calc(100% + 8px);
        transform: translateX(-50%);
      }
    }
    .effect-tooltip .effect-line {
      font-size: 11px;
      line-height: 1.8;
      color: #e8d4aa;
    }
    .effect-tooltip .effect-pos { color: #7dce82; }
    .effect-tooltip .effect-neg { color: #e05c5c; }
    .effect-tooltip .effect-neu { color: #c9a84c; }

    /* T073: Card selection gold flash */
    .card-option-selected {
      background: rgba(201, 168, 76, 0.3) !important;
      border-color: #c9a84c !important;
      transition: none !important;
    }

    /* T071: Mobile card layout — stack vertically on narrow viewports */
    @media (max-width: 560px) {
      .card-options {
        flex-direction: column;
      }
      .card-option {
        max-width: 100%;
        min-width: unset;
      }
    }

    /* T059: Mobile minigame canvas — prevent overflow on 375px viewport */
    #minigame-container canvas {
      max-width: 100%;
      max-height: 60vh;
    }
    @media (max-width: 390px) {
      #minigame-container .minigame-title {
        font-size: 14px;
        letter-spacing: 1px;
      }
      #minigame-container {
        padding: 0 8px;
        box-sizing: border-box;
      }
    }

    /* Minigame overlay */
    #minigame-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(5, 8, 18, 0.93);
      z-index: 30;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8dcc8;
    }
    #minigame-overlay.visible { display: flex; }

    /* Fade transition */
    #fade-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0a0a12;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      z-index: 50;
    }
    #fade-overlay.active { opacity: 1; }

    /* Loading screen */
    #loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #0a0a12;
      color: #e8dcc8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      z-index: 100;
    }
    #loading h1 { font-size: 32px; margin-bottom: 8px; letter-spacing: 4px; }
    #loading p { font-size: 14px; opacity: 0.6; }
    #loading .spinner {
      width: 64px; height: 64px;
      margin-top: 32px;
      position: relative;
    }
    #loading .spinner::before,
    #loading .spinner::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 3px solid transparent;
      border-radius: 50%;
    }
    #loading .spinner::before {
      border-top-color: #cd853f;
      border-bottom-color: #cd853f;
      animation: spin 1.2s linear infinite;
    }
    #loading .spinner::after {
      border-left-color: rgba(205,133,63,0.4);
      border-right-color: rgba(205,133,63,0.4);
      animation: spin 1.8s linear infinite reverse;
      width: 80%; height: 80%;
      top: 10%; left: 10%;
    }
    #loading .loading-status {
      margin-top: 16px;
      font-size: 12px;
      opacity: 0.4;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes spin-slow { to { transform: rotate(360deg); } }

    /* LLM loading hint — shown during Groq card generation (BUG-C60-02 fix) */
    .llm-loading-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,18,0.85);
      color: rgba(205,133,63,0.8);
      font-family: system-ui, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 8px 20px;
      border-radius: 20px;
      border: 1px solid rgba(205,133,63,0.3);
      z-index: 60;
      pointer-events: none;
      letter-spacing: 1px;
    }

    /* T047: Card flip animation — rotateY 0->90 (hide front) then 0->0 (reveal content) */
    .card-container {
      perspective: 1000px;
    }
    @keyframes card-flip-in {
      0%   { transform: rotateY(0deg);   opacity: 1; }
      45%  { transform: rotateY(90deg);  opacity: 0; }
      55%  { transform: rotateY(-90deg); opacity: 0; }
      100% { transform: rotateY(0deg);   opacity: 1; }
    }
    .card-flip {
      animation: card-flip-in 0.4s ease-in-out forwards;
    }
  </style>
</head>
<body>
  <!-- Boot Screen T060 — outside #app to prevent composite z-index black patch (Bug 1 fix) -->
  <div id="boot-screen">
      <svg class="boot-logo" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Celtic knot: interlaced triquetra-inspired design -->
        <circle cx="60" cy="60" r="54" stroke="rgba(205,133,63,0.15)" stroke-width="1"/>
        <circle cx="60" cy="60" r="46" stroke="rgba(205,133,63,0.08)" stroke-width="1"/>
        <!-- Outer ring with ticks -->
        <circle cx="60" cy="60" r="52" stroke="#cd853f" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.5"
          style="animation: spin-slow 20s linear infinite; transform-origin: 60px 60px;"/>
        <!-- Celtic triquetra knot paths -->
        <path d="M60 20 C72 28, 88 32, 92 48 C96 64, 84 76, 72 80 C84 84, 94 94, 84 104 C74 114, 60 108, 60 96"
          stroke="#cd853f" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
        <path d="M60 20 C48 28, 32 32, 28 48 C24 64, 36 76, 48 80 C36 84, 26 94, 36 104 C46 114, 60 108, 60 96"
          stroke="#cd853f" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
        <path d="M60 96 C60 84, 52 72, 48 80 C44 88, 50 100, 60 104 C70 100, 76 88, 72 80 C68 72, 60 84, 60 96"
          stroke="#f4c97a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
        <!-- Center circle -->
        <circle cx="60" cy="60" r="6" fill="#cd853f" opacity="0.8"/>
        <circle cx="60" cy="60" r="3" fill="#f4c97a"/>
        <!-- Ogham marks -->
        <line x1="60" y1="6" x2="60" y2="14" stroke="#cd853f" stroke-width="2" opacity="0.6"/>
        <line x1="112" y1="60" x2="114" y2="60" stroke="#cd853f" stroke-width="2" opacity="0.6"/>
        <line x1="6" y1="60" x2="8" y2="60" stroke="#cd853f" stroke-width="2" opacity="0.6"/>
        <line x1="60" y1="106" x2="60" y2="114" stroke="#cd853f" stroke-width="2" opacity="0.6"/>
      </svg>
      <div class="boot-title">M.E.R.L.I.N.</div>
      <div class="boot-subtitle">Le Jeu des Oghams</div>
      <div class="boot-progress-track">
        <div class="boot-progress-fill"></div>
      </div>
      <div class="boot-status" id="boot-status-text" aria-live="polite" aria-atomic="true">Initialisation...</div>
    </div>
  <!-- C163: CRT persistent overlays — pointer-events:none, always on top of game content -->
  <div id="crt-scanlines" aria-hidden="true"></div>
  <div id="crt-vignette" aria-hidden="true"></div>

  <div id="app" class="crt-glitch-layer">
    <!-- Main Menu Canvas Wrapper (Three.js cinematic) -->
    <div id="menu-canvas-wrapper"></div>
    <!-- Merlin's Lair Canvas Wrapper (T062) -->
    <div id="lair-canvas-wrapper"></div>
    <!-- Lair zone hover tooltip -->
    <div id="lair-tooltip"></div>
    <!-- Main Menu UI Overlay -->
    <div id="main-menu-overlay">
      <div class="menu-title-block">
        <h1>M.E.R.L.I.N.</h1>
        <p>Le Jeu des Oghams</p>
      </div>
      <div class="menu-btn-group">
        <button id="menu-start-btn">Commencer le Voyage</button>
        <button id="menu-continue-btn">Continuer l'Aventure</button>
      </div>
    </div>
    <div id="loading">
      <h1>M.E.R.L.I.N.</h1>
      <p>Le Jeu des Oghams</p>
      <div class="spinner"></div>
      <div class="loading-status">Chargement du monde...</div>
    </div>
    <div id="hud">
      <div>
        <div class="info">Vie</div>
        <div class="life-bar" id="life-bar-container" role="progressbar" aria-label="Points de vie" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100">

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERLIN Web-Demo — Scene Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Courier+Prime&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030507;
  --bg-panel: rgba(8, 18, 10, 0.92);
  --phosphor: #33ff66;
  --dim: #1a8833;
  --bright: #88ffaa;
  --amber: #ffaa00;
  --amber-dim: #997320;
  --cyan: #4dd9cc;
  --danger: #e05c5c;
  --purple: #b888e8;
  --blue: #8ab4f8;
  --border: #1a3320;
  --font: 'VT323', 'Courier New', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: var(--bg); font-family: var(--font); color: var(--phosphor); font-size: 16px; overflow: hidden; }

.app { display: flex; height: 100vh; }

/* ── Sidebar ── */
.sidebar { width: 300px; min-width: 300px; background: rgba(3, 5, 7, 0.95); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); text-align: center; }
.sidebar-header h1 { color: var(--amber); font-size: 1.3em; letter-spacing: 3px; }
.sidebar-header p { color: var(--dim); font-size: 0.75em; margin-top: 4px; }
.sidebar-header .stats { color: var(--dim); font-size: 0.7em; margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; line-height: 1.6; }

.section-label { padding: 8px 12px 4px; color: var(--amber-dim); font-size: 0.75em; letter-spacing: 2px; border-bottom: 1px solid rgba(26, 51, 32, 0.5); }

.scene-item { padding: 8px 12px; border: 1px solid transparent; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; gap: 1px; }
.scene-item:hover { border-color: var(--dim); background: rgba(20, 50, 20, 0.3); }
.scene-item.active { border-color: var(--phosphor); background: rgba(20, 50, 20, 0.5); box-shadow: 0 0 8px rgba(51, 255, 102, 0.1); }
.scene-item .name { font-size: 0.95em; }
.scene-item .meta { color: var(--dim); font-size: 0.7em; display: flex; gap: 6px; align-items: center; }

.tag { display: inline-block; padding: 0px 5px; border: 1px solid; font-size: 0.65em; border-radius: 2px; }
.tag-3d { color: var(--cyan); border-color: var(--cyan); }
.tag-dom { color: var(--dim); border-color: var(--dim); }
.tag-llm { color: var(--amber); border-color: var(--amber); }
.tag-glb { color: var(--purple); border-color: var(--purple); }
.tag-zustand { color: var(--blue); border-color: var(--blue); }
.tag-minigame { color: #e8c84c; border-color: #e8c84c; }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar { display: flex; align-items: center; gap: 12px; padding: 6px 16px; border-bottom: 1px solid var(--border); background: rgba(3, 5, 7, 0.9); }
.toolbar .scene-title { color: var(--amber); font-size: 1.1em; flex: 1; }
.toolbar .file-path { color: var(--dim); font-size: 0.75em; }
.btn { background: none; border: 1px solid var(--dim); color: var(--phosphor); font-family: var(--font); font-size: 0.8em; padding: 3px 10px; cursor: pointer; transition: all 0.15s; }
.btn:hover { border-color: var(--phosphor); text-shadow: 0 0 8px var(--phosphor); }
.btn.active { background: rgba(51, 255, 102, 0.1); border-color: var(--phosphor); }

.content-area { display: flex; flex: 1; overflow: hidden; }
.preview-area { flex: 1; position: relative; overflow: hidden; }
.preview-frame { position: absolute; inset: 0; }
.scene-preview { width: 100%; height: 100%; position: relative; overflow: auto; }

/* ── Info Panel ── */
.info-panel { width: 320px; min-width: 320px; background: rgba(3, 5, 7, 0.95); border-left: 1px solid var(--border); padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; font-size: 0.85em; }
.info-panel.hidden { display: none; }
.info-section h3 { color: var(--amber); font-size: 0.85em; margin-bottom: 6px; border-bottom: 1px solid var(--border); padding-bottom: 3px; }
.info-row { display: flex; justify-content: space-between; font-size: 0.8em; padding: 1px 0; }
.info-row .label { color: var(--dim); }
.info-row .value { color: var(--phosphor); text-align: right; max-width: 200px; word-break: break-all; }
.info-deps { font-size: 0.75em; color: var(--dim); line-height: 1.8; }
.info-deps span { display: inline-block; padding: 0px 5px; border: 1px solid var(--border); margin: 2px 3px 2px 0; }
.flow-box { font-size: 0.75em; color: var(--dim); line-height: 2; text-align: center; }
.flow-box .current { color: var(--amber); border: 1px solid var(--amber); padding: 1px 8px; }
.flow-box .arrow { color: var(--dim); margin: 0 4px; }

/* ── Preview styles ── */
.pv { display: flex; align-items: center; justify-content: center; height: 100%; }
.pv-col { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; padding: 32px; }

/* Menu */
.pv-menu { background: linear-gradient(180deg, #0a1520 0%, #030507 40%, #0a0f05 100%); }
.pv-menu .cliff { position: absolute; bottom: 0; left: 0; right: 0; height: 45%; background: linear-gradient(180deg, #3a2e18 0%, #2a1e0a 60%, #1a0e02 100%); clip-path: polygon(0 30%, 15% 10%, 30% 25%, 50% 5%, 70% 20%, 85% 8%, 100% 35%, 100% 100%, 0 100%); }
.pv-menu .ocean { position: absolute; bottom: 0; left: 0; right: 0; height: 25%; background: linear-gradient(180deg, #1a4040 0%, #0a2a2a 50%, #051515 100%); }
.pv-menu .title-area { position: relative; z-index: 2; text-align: center; }
.pv-menu .title { font-family: 'Courier Prime', monospace; color: #c8e8ff; font-size: 3em; font-weight: bold; letter-spacing: 0.06em; text-shadow: 0 0 18px rgba(170,210,255,0.55); }
.pv-menu .subtitle { color: rgba(200, 232, 255, 0.4); font-size: 0.9em; margin-top: 8px; }
.pv-menu .menu-btns { margin-top: 32px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
.pv-menu .m-btn { font-family: var(--font); padding: 10px 28px; border: 1px solid rgba(200,232,255,0.3); color: #c8e8ff; background: rgba(10,20,30,0.6); font-size: 1em; }
.pv-menu .m-btn.primary { border-color: rgba(200,232,255,0.6); text-shadow: 0 0 8px rgba(170,210,255,0.4); }

/* CeltOS */
.pv-celtos { background: var(--bg); }
.pv-celtos .terminal { max-width: 600px; width: 90%; font-size: 0.82em; line-height: 1.7; color: var(--phosphor); }
.pv-celtos .line { margin-bottom: 1px; }
.pv-celtos .logo-block { color: var(--bright); font-size: 0.7em; line-height: 1.15; margin: 8px 0; white-space: pre; }
.pv-celtos .pixel-logo { display: flex; flex-direction: column; gap: 2px; margin: 12px 0; }
.pv-celtos .pixel-row { display: flex; gap: 2px; }
.pv-celtos .px { width: 10px; height: 10px; }
.pv-celtos .px.on { background: var(--phosphor); box-shadow: 0 0 4px var(--phosphor); }
.pv-celtos .px.off { background: transparent; }
.pv-celtos .bar { height: 12px; width: 300px; border: 1px solid var(--dim); margin-top: 8px; }
.pv-celtos .bar-fill { height: 100%; width: 75%; background: var(--phosphor); transition: width 0.5s; }

/* Lair */
.pv-lair { background: #0a0806; position: relative; }
.pv-lair .room { width: 80%; max-width: 700px; height: 70%; border: 2px solid #3a3228; background: linear-gradient(180deg, #1a1610 0%, #0a0806 100%); position: relative; display: flex; align-items: center; justify-content: center; }
.pv-lair .zone { position: absolute; padding: 10px 16px; border: 1px solid var(--dim); cursor: default; transition: all 0.2s; text-align: center; font-size: 0.8em; }
.pv-lair .zone:hover { border-color: var(--phosphor); background: rgba(51, 255, 102, 0.05); }
.pv-lair .zone .icon { font-size: 1.8em; display: block; margin-bottom: 4px; }
.pv-lair .zone .label { color: var(--dim); font-size: 0.75em; }
.pv-lair .z-map { top: 15%; left: 8%; }
.pv-lair .z-crystal { top: 15%; right: 8%; }
.pv-lair .z-book { bottom: 15%; left: 8%; }
.pv-lair .z-cauldron { bottom: 15%; right: 8%; }
.pv-lair .z-door { bottom: 5%; left: 50%; transform: translateX(-50%); }
.pv-lair .z-skull { top: 5%; left: 50%; transform: translateX(-50%); }
.pv-lair .window-view { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); width: 120px; height: 80px; border: 2px solid #3d2b1a; background: linear-gradient(180deg, #1a3020 0%, #0a2010 50%, #051008 100%); border-radius: 50% 50% 0 0; }
.pv-lair .light { position: absolute; width: 40px; height: 40px; border-radius: 50%; background: radial-gradient(circle, rgba(255,170,0,0.3), transparent); }
.pv-lair .l1 { top: 30%; left: 30%; }
.pv-lair .l2 { top: 40%; right: 25%; }

/* Biome (forest) */
.pv-forest { background: linear-gradient(180deg, #0a1a0a 0%, #051005 100%); position: relative; overflow: hidden; }
.pv-forest .ground { position: absolute; bottom: 0; left: 0; right: 0; height: 40%; background: linear-gradient(180deg, #2e7a18 0%, #1a4a0e 50%, #0a2a05 100%); }
.pv-forest .fog { position: absolute; bottom: 35%; left: 0; right: 0; height: 15%; background: linear-gradient(180deg, transparent, rgba(51,255,102,0.03)); }
.pv-forest .trees { position: absolute; bottom: 30%; left: 0; right: 0; display: flex; justify-content: space-around; }
.pv-forest .tree { display: flex; flex-direction: column; align-items: center; }
.pv-forest .canopy { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 40px solid #1a5a0a; }
.pv-forest .canopy.big { border-left-width: 30px; border-right-width: 30px; border-bottom-width: 55px; border-bottom-color: #185a08; }
.pv-forest .trunk { width: 6px; height: 20px; background: #3d2b1a; }
.pv-forest .path { position: absolute; bottom: 0; left: 40%; right: 35%; height: 40%; background: rgba(90, 70, 40, 0.3); clip-path: polygon(30% 0, 70% 0, 90% 100%, 10% 100%); }
.pv-forest .stones { position: absolute; bottom: 38%; left: 15%; display: flex; gap: 60px; }
.pv-forest .stone { width: 15px; height: 25px; background: #4a4a3a; border-radius: 3px 3px 0 0; }
.pv-forest .info { position: relative; z-index: 2; text-align: center; }
.pv-forest .info h2 { color: var(--bright); font-size: 1.4em; }
.pv-forest .info p { color: var(--dim); font-size: 0.8em; margin-top: 4px; }

/* Coast */
.pv-coast { background: linear-gradient(180deg, #0a1520 0%, #0a1a2a 50%, #030507 100%); position: relative; overflow: hidden; }
.pv-coast .sky { position: absolute; top: 0; left: 0; right: 0; height: 40%; background: linear-gradient(180deg, #1a3050 0%, #0a2040 100%); }
.pv-coast .clouds { position: absolute; top: 10%; left: 0; right: 0; display: flex; justify-content: space-around; }
.pv-coast .cloud { background: rgba(200,220,240,0.15); border-radius: 20px; height: 12px; }
.pv-coast .cliff { position: absolute; bottom: 20%; left: 0; right: 0; height: 35%; background: #3a2e18; clip-path: polygon(0 40%, 20% 20%, 35% 35%, 55% 10%, 75% 30%, 90% 15%, 100% 45%, 100% 100%, 0 100%); }
.pv-coast .ocean { position: absolute; bottom: 0; left: 0; right: 0; height: 25%; background: linear-gradient(180deg, #1a4a4a 0%, #0a2a2a 50%, #051515 100%); }
.pv-coast .tower { position: absolute; bottom: 45%; right: 25%; width: 20px; height: 50px; background: #4a4030; }
.pv-coast .tower-top { position: absolute; bottom: 95%; right: 24%; width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-bottom: 20px solid #3a3020; }
.pv-coast .info { position: relative; z-index: 2; text-align: center; }
.pv-coast .info h2 { color: var(--cyan); font-size: 1.4em; }

/* Generic biome */
.pv-generic { background: var(--bg); }
.pv-generic .placeholder { text-align: center; padding: 40px; border: 2px dashed var(--border); max-width: 500px; }
.pv-generic h2 { color: var(--amber); font-size: 1.3em; margin-bottom: 12px; }
.pv-generic p { color: var(--dim); font-size: 0.85em; line-height: 1.6; }
.pv-generic .biome-list { text-align: left; margin-top: 16px; }
.pv-generic .biome-list li { color: var(--dim); font-size: 0.8em; margin-bottom: 4px; list-style: none; }
.pv-generic .biome-list li::before { content: "> "; color: var(--amber); }

/* Card overlay */
.pv-card { background: rgba(3, 5, 7, 0.97); }
.pv-card .card { max-width: 520px; width: 90%; background: linear-gradient(180deg, #1a1508 0%, #0f0d06 100%); border: 2px solid #3d3520; padding: 24px; position: relative; }
.pv-card .card::before { content: ''; position: absolute; inset: 4px; border: 1px solid rgba(180,150,80,0.15); pointer-events: none; }
.pv-card .card-title { color: var(--amber); font-size: 1.2em; text-align: center; margin-bottom: 12px; text-shadow: 0 0 8px rgba(255,170,0,0.3); }
.pv-card .card-text { color: #c8c0a0; font-size: 0.9em; line-height: 1.7; margin-bottom: 16px; }
.pv-card .options { display: flex; flex-direction: column; gap: 8px; }
.pv-card .option { padding: 10px 14px; border: 1px solid #3d3520; background: rgba(15, 13, 6, 0.8); color: #b8b098; font-family: var(--font); font-size: 0.9em; text-align: left; cursor: default; transition: all 0.15s; }
.pv-card .option:hover { border-color: var(--amber); color: var(--amber); }
.pv-card .option .fx { color: var(--dim); font-size: 0.7em; margin-top: 4px; }

/* HUD */
.pv-hud { background: var(--bg); padding: 20px; }
.pv-hud .hud-mock { width: 100%; max-width: 800px; }
.pv-hud .hud-top { display: flex; justify-content: space-between; margin-bottom: 16px; }
.pv-hud .life-section { display: flex; align-items: center; gap: 8px; }
.pv-hud .life-bar { width: 120px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid var(--dim); }
.pv-hud .life-fill { height: 100%; width: 80%; background: linear-gradient(90deg, var(--danger), #ff8888); }
.pv-hud .anam { color: var(--bright); font-size: 1.1em; }
.pv-hud .factions { display: flex; gap: 12px; flex-wrap: wrap; }
.pv-hud .faction { flex: 1; min-width: 120px; }
.pv-hud .f-label { font-size: 0.75em; display: flex; justify-content: space-between; margin-bottom: 3px; }
.pv-hud .f-bar { height: 6px; background: rgba(255,255,255,0.08); }
.pv-hud .f-fill { height: 100%; }
.pv-hud .bottom-row { display: flex; justify-content: space-between; margin-top: 12px; font-size: 0.8em; color: var(--dim); }

/* MapGen */
.pv-mapgen { background: var(--bg); }
.pv-mapgen .parchment { max-width: 700px; width: 90%; display: flex; gap: 16px; border: 1px solid var(--border); background: var(--bg-panel); padding: 20px; }
.pv-mapgen .left { flex: 1; }
.pv-mapgen .map-title { color: var(--amber); font-size: 1.1em; margin-bottom: 8px; }
.pv-mapgen .scenario-text { color: var(--dim); font-size: 0.8em; line-height: 1.7; }
.pv-mapgen .right { width: 200px; min-width: 200px; }
.pv-mapgen .map-canvas { width: 100%; height: 200px; border: 1px solid var(--border); background: #050a05; position: relative; }
.pv-mapgen .map-node { position: absolute; width: 8px; height: 8px; border-radius: 50%; }
.pv-mapgen .map-path { position: absolute; width: 2px; background: var(--dim); }
.pv-mapgen .enter-btn { margin-top: 12px; width: 100%; font-family: var(--font); padding: 8px; border: 1px solid var(--phosphor); color: var(--phosphor); background: none; font-size: 0.9em; }

/* RunSummary */
.pv-summary { background: var(--bg); }
.pv-summary .panel { max-width: 500px; width: 90%; border: 2px solid var(--border); background: var(--bg-panel); padding: 24px; text-align: center; }
.pv-summary .header { color: var(--amber); font-size: 1.4em; letter-spacing: 3px; margin-bottom: 8px; text-shadow: 0 0 12px rgba(255,170,0,0.3); }
.pv-summary .cause { color: var(--danger); font-size: 0.85em; margin-bottom: 16px; padding: 4px 12px; border: 1px solid var(--danger); display: inline-block; }
.pv-summary .stats { text-align: left; margin-bottom: 16px; }
.pv-summary .stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85em; border-bottom: 1px solid rgba(26, 51, 32, 0.3); }
.pv-summary .stat .k { color: var(--dim); }
.pv-summary .factions-bars { margin-bottom: 16px; }
.pv-summary .fb { margin-bottom: 6px; }
.pv-summary .fb-label { font-size: 0.75em; display: flex; justify-content: space-between; margin-bottom: 2px; }
.pv-summary .fb-bar { height: 8px; background: rgba(255,255,255,0.05); }
.pv-summary .fb-fill { height: 100%; }
.pv-summary .restart { font-family: var(--font); padding: 10px 24px; border: 1px solid var(--phosphor); color: var(--phosphor); background: none; font-size: 1em; cursor: default; }

/* OghamPanel */
.pv-ogham { background: rgba(3, 5, 7, 0.97); }
.pv-ogham .panel { max-width: 500px; width: 90%; border: 1px solid var(--border); background: var(--bg-panel); padding: 20px; }
.pv-ogham .panel-title { color: var(--amber); text-align: center; font-size: 1.1em; margin-bottom: 16px; }
.pv-ogham .slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.pv-ogham .slot { border: 1px solid var(--dim); padding: 10px; text-align: center; cursor: default; transition: all 0.15s; }
.pv-ogham .slot:hover { border-color: var(--phosphor); background: rgba(51,255,102,0.05); }
.pv-ogham .slot .rune { font-size: 1.8em; color: var(--phosphor); }
.pv-ogham .slot .s-name { font-size: 0.8em; color: var(--dim); margin-top: 4px; }
.pv-ogham .slot .s-desc { font-size: 0.7em; color: rgba(26, 136, 51, 0.6); margin-top: 2px; }
.pv-ogham .skip-btn { display: block; margin: 12px auto 0; font-family: var(--font); padding: 6px 20px; border: 1px solid var(--dim); color: var(--dim); background: none; font-size: 0.85em; }

/* MerlinIntro */
.pv-mintro { background: rgba(3, 5, 7, 0.95); }
.pv-mintro .dialogue { max-width: 500px; width: 90%; }
.pv-mintro .portrait { text-align: center; margin-bottom: 16px; }
.pv-mintro .portrait .silhouette { font-size: 4em; filter: drop-shadow(0 0 12px var(--amber)); }
.pv-mintro .text { color: var(--phosphor); font-size: 0.95em; line-height: 1.7; border-left: 2px solid var(--dim); padding-left: 12px; }
.pv-mintro .advance { color: var(--dim); font-size: 0.75em; text-align: center; margin-top: 16px; }

/* SceneTransition */
.pv-trans { background: var(--bg); }
.pv-trans .demo { width: 300px; height: 200px; border: 1px solid var(--border); position: relative; overflow: hidden; }
.pv-trans .fade { position: absolute; inset: 0; background: var(--bg); }
.pv-trans .flash { position: absolute; inset: 0; background: rgba(10, 40, 10, 0.15); }
.pv-trans .info { text-align: center; margin-top: 16px; }

/* Minigames */
.pv-mg { background: var(--bg); }
.pv-mg .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 600px; width: 90%; }
.pv-mg .mg-card { border: 1px solid var(--border); padding: 10px; text-align: center; }
.pv-mg .mg-card .mg-icon { font-size: 1.5em; margin-bottom: 4px; }
.pv-mg .mg-card .mg-name { color: var(--phosphor); font-size: 0.8em; }
.pv-mg .mg-card .mg-lines { color: var(--dim); font-size: 0.65em; }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>M.E.R.L.I.N.</h1>
      <p>web-demo Scene Viewer</p>
      <div class="stats">
        ~40K lines TypeScript | Three.js + Zustand<br>
        Deployed: web-demo-flame-rho.vercel.app<br>
        8 scenes + 9 UI overlays + 15 minigames
      </div>
    </div>
    <div id="scene-list"></div>
  </div>

  <div class="main">
    <div class="toolbar">
      <span class="scene-title" id="scene-title">Select a scene</span>
      <span class="file-path" id="file-path"></span>
      <button class="btn" id="btn-info" onclick="toggleInfo()">[ Info ]</button>
      <button class="btn" onclick="navScene(-1)">[ &lt; ]</button>
      <button class="btn" onclick="navScene(1)">[ &gt; ]</button>
    </div>
    <div class="content-area">
      <div class="preview-area"><div class="preview-frame" id="preview-frame"></div></div>
      <div class="info-panel" id="info-panel">
        <div class="info-section" id="info-details"></div>
        <div class="info-section" id="info-flow"></div>
        <div class="info-section" id="info-deps"></div>
        <div class="info-section" id="info-notes"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SCENES = [
  // ─── 3D SCENES ─────────────────────────────────────────────
  { id:'main-menu', name:'Main Menu (Coastal Cliff)', cat:'3D Scenes', file:'src/scenes/MainMenuScene.ts', lines:852, tags:['3D'], deps:['three.js','SceneManager'],
    flow:{prev:null,next:['CeltOS Intro','Lair (continue)']},

let currentIndex = 0;
let infoVisible = true;

function init() {
  const list = document.getElementById('scene-list');
  let currentCat = '';
  SCENES.forEach((s, i) => {
    if (s.cat !== currentCat) {
      currentCat = s.cat;
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = currentCat;
      list.appendChild(label);
    }
    const item = document.createElement('div');
    item.className = 'scene-item';
    item.dataset.index = i;
    item.innerHTML = `<div class="name">${s.name}</div><div class="meta">${s.tags.map(t=>`<span class="tag tag-${t.toLowerCase()}">${t}</span>`).join('')} <span>${s.lines.toLocaleString()}L</span></div>`;
    item.addEventListener('click', () => selectScene(i));
    list.appendChild(item);
  });
  selectScene(0);
}

function selectScene(i) {
  currentIndex = i;
  const s = SCENES[i];
  document.querySelectorAll('.scene-item').forEach((el, j) => el.classList.toggle('active', j === i));
  document.getElementById('scene-title').textContent = s.name;
  document.getElementById('file-path').textContent = s.file;
  document.getElementById('preview-frame').innerHTML = s.preview;

  document.getElementById('info-details').innerHTML = `<h3>Details</h3>
    <div class="info-row"><span class="label">File</span><span class="value">${s.file}</span></div>
    <div class="info-row"><span class="label">Lines</span><span class="value">${s.lines.toLocaleString()}</span></div>
    <div class="info-row"><span class="label">Category</span><span class="value">${s.cat}</span></div>
    <div class="info-row"><span class="label">Tags</span><span class="value">${s.tags.join(', ')}</span></div>`;

  document.getElementById('info-flow').innerHTML = `<h3>Navigation</h3><div class="flow-box">
    ${s.flow?.prev ? `<span>${s.flow.prev}</span><span class="arrow">-></span>` : ''}
    <span class="current">${s.id}</span>
    ${s.flow?.next ? `<span class="arrow">-></span><span>${Array.isArray(s.flow.next)?s.flow.next.join(' | '):s.flow.next}</span>` : ''}
  </div>`;

  document.getElementById('info-deps').innerHTML = `<h3>Dependencies (${s.deps.length})</h3>
    <div class="info-deps">${s.deps.length?s.deps.map(d=>`<span>${d}</span>`).join(''):'<span style="color:var(--dim)">None</span>'}</div>`;

  document.getElementById('info-notes').innerHTML = `<h3>Notes</h3><p style="font-size:0.8em;color:var(--dim);line-height:1.6">${s.notes}</p>`;
}

function navScene(d) { const n=currentIndex+d; if(n>=0&&n<SCENES.length) selectScene(n); }
function toggleInfo() { infoVisible=!infoVisible; document.getElementById('info-panel').classList.toggle('hidden',!infoVisible); document.getElementById('btn-info').classList.toggle('active',infoVisible); }

document.addEventListener('keydown', e => {
  if(e.key==='ArrowUp'||e.key==='ArrowLeft'){e.preventDefault();navScene(-1);}
  if(e.key==='ArrowDown'||e.key==='ArrowRight'){e.preventDefault();navScene(1);}
  if(e.key==='i') toggleInfo();
});

init();
</script>

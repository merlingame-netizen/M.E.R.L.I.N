name: Deploy Mission Control

on:
  push:
    branches: [main]
    paths:
      - 'tools/autodev/mission-control/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build
        run: cd tools/autodev/mission-control && npm ci && npm run build
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_DASHBOARD_PROJECT_ID }}
          working-directory: tools/autodev/mission-control
          vercel-args: '--prod'

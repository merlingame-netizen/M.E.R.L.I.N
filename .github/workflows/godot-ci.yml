name: Godot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  editor-parse:
    name: Editor Parse Check
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.5
    steps:
      - uses: actions/checkout@v4

      - name: Import project
        run: |
          mkdir -p ~/.config/godot
          godot --headless --path . --import --quit || true

      - name: Editor parse check (script errors)
        run: |
          OUTPUT=$(godot --headless --editor --quit-after 10 --path . 2>&1 || true)
          echo "$OUTPUT"
          ERRORS=$(echo "$OUTPUT" | grep -c "SCRIPT ERROR" || true)
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Found $ERRORS script errors"
            exit 1
          fi
          echo "No script errors found"

  server-build:
    name: Server TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: cd server && npm ci
      - name: TypeScript build check
        run: cd server && npm run build

  scene-smoke:
    name: Scene Smoke Tests
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.5
    needs: editor-parse
    strategy:
      matrix:
        scene:
          - res://scenes/IntroCeltOS.tscn
          - res://scenes/MenuPrincipal.tscn
          - res://scenes/SelectionSauvegarde.tscn
          - res://scenes/HubAntre.tscn
          - res://scenes/TransitionBiome.tscn
          - res://scenes/MerlinGame.tscn
    steps:
      - uses: actions/checkout@v4

      - name: Import project
        run: |
          mkdir -p ~/.config/godot
          godot --headless --path . --import --quit || true

      - name: Run scene ${{ matrix.scene }}
        run: |
          OUTPUT=$(timeout 30 godot --headless --quit-after 15 --path . --scene-path ${{ matrix.scene }} 2>&1 || true)
          echo "$OUTPUT"
          ERRORS=$(echo "$OUTPUT" | grep -c "SCRIPT ERROR" || true)
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Found $ERRORS script errors in ${{ matrix.scene }}"
            exit 1
          fi
          echo "Scene ${{ matrix.scene }} passed"

      - name: Upload Godot logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: godot-logs-${{ matrix.scene }}
          path: ~/.local/share/godot/
          retention-days: 7

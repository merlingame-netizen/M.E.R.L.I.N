name: Godot CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'tools/autodev/**'
      - '*.md'
      - 'memory/**'
      - '.claude/**'
  pull_request:
    branches: [main]

concurrency:
  group: "godot-ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  editor-parse:
    name: Editor Parse Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container: barichello/godot-ci:4.5
    steps:
      - uses: actions/checkout@v4

      - name: Import project
        run: |
          mkdir -p ~/.config/godot
          godot --headless --path . --import --quit || true

      - name: Editor parse check (script errors)
        run: |
          OUTPUT=$(godot --headless --editor --quit-after 10 --path . 2>&1 || true)
          echo "$OUTPUT"
          ERRORS=$(echo "$OUTPUT" | grep -c "SCRIPT ERROR" || true)
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Found $ERRORS script errors"
            exit 1
          fi
          echo "No script errors found"

  server-build:
    name: Server TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: TypeScript build check
        run: cd server && npm ci && npm run build

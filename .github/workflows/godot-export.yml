name: Godot Export & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'tools/autodev/**'
      - '*.md'
      - 'memory/**'
      - '.claude/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "godot-export"
  cancel-in-progress: false

jobs:
  export-web:
    name: Export Godot Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container: barichello/godot-ci:4.5
    steps:
      - uses: actions/checkout@v4

      - name: Prepare project for headless CI export
        run: |
          # Remove GDExtension (Windows-only DLL)
          rm -f addons/merlin_llm/merlin_llm.gdextension addons/merlin_llm/merlin_llm.gdextension.uid

          # Remove ALL editor plugins (MCP server hangs on port 9080)
          sed -i '/\[editor_plugins\]/,/^$/d' project.godot

          # Patch shaders: remove hint_screen_texture (hangs in headless)
          for shader in shaders/*.gdshader; do
            [ -f "$shader" ] && sed -i 's/hint_screen_texture, //g; s/hint_screen_texture//g' "$shader"
          done

          # Remove autoloads that block in headless (network/audio servers)
          sed -i '/GameDebugServer=/d' project.godot
          sed -i '/MerlinAI=/d' project.godot

          echo "=== Project prepared for CI ==="
          grep "^\[autoload\]" -A30 project.godot | head -25

      - name: Generate export preset
        run: |
          cat > export_presets.cfg << 'PRESET'
          [preset.0]
          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter="archive/*, tools/*, web-demo/*, docs/*, memory/*, .claude/*, .git/*, Assets/*, *.blend*, *.fbx, *.obj, *.md"
          export_path="web-export/index.html"
          encrypt_pck=false
          export_files=PackedStringArray()
          [preset.0.options]
          vram_texture_compression/for_desktop=true
          html/canvas_resize_policy=2
          html/focus_canvas_on_start=true
          html/export_icon=true
          progressive_web_app/enabled=false
          PRESET
          sed -i 's/^          //' export_presets.cfg
          echo "=== Export preset ==="
          cat export_presets.cfg

      - name: Import project
        timeout-minutes: 20
        run: |
          timeout 900 godot --headless --path . --import --quit 2>&1 | tail -5 || echo "Import timeout (expected)"
          echo "=== Imported files count: $(find .godot/imported -type f 2>/dev/null | wc -l) ==="

      - name: Export Web
        timeout-minutes: 60
        run: |
          mkdir -p web-export
          echo "=== Starting export ==="
          timeout 3300 godot --headless --export-release "Web" web-export/index.html --path . 2>&1 | tail -20 || echo "Export timeout"
          echo "=== Export result ==="
          ls -la web-export/ 2>/dev/null
          if [ ! -f web-export/index.html ]; then
            echo "::error::No index.html — trying export-debug as fallback"
            timeout 3300 godot --headless --export-debug "Web" web-export/index.html --path . 2>&1 | tail -20 || echo "Debug export timeout"
            ls -la web-export/ 2>/dev/null
          fi
          if [ ! -f web-export/index.html ]; then
            echo "::error::Both release and debug export failed"
            exit 1
          fi
          echo "=== Export successful ==="

      - uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: web-export/
          retention-days: 7

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-export/

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: export-web
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: export-web
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-export
          path: web-export/
      - name: Deploy game to Vercel
        working-directory: web-export
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -e
          npm i -g vercel@latest
          CLEAN_TOKEN=$(echo "$VERCEL_TOKEN" | tr -d '[:space:]')
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json
          vercel deploy --prod --yes --force --token="$CLEAN_TOKEN"
          echo "=== Deploy complete ==="

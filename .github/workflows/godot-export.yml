name: Godot Export & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'tools/autodev/**'
      - '*.md'
      - 'memory/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "godot-export"
  cancel-in-progress: false

jobs:
  export-web:
    name: Export Godot Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container: barichello/godot-ci:4.5
    steps:
      - uses: actions/checkout@v4

      - name: Remove Windows-only GDExtension (blocks Linux CI)
        run: rm -f addons/merlin_llm/merlin_llm.gdextension addons/merlin_llm/merlin_llm.gdextension.uid

      - name: Fix headless-incompatible shaders (hint_screen_texture hangs export)
        run: |
          # Replace hint_screen_texture with filter_nearest (GL Compat headless can't compile it)
          for shader in shaders/crt_terminal.gdshader shaders/retro_psx_post.gdshader shaders/screen_dither.gdshader shaders/screen_distortion.gdshader shaders/ps1_material.gdshader shaders/pixelate.gdshader; do
            if [ -f "$shader" ]; then
              sed -i 's/hint_screen_texture, //g' "$shader"
              sed -i 's/hint_screen_texture//g' "$shader"
              echo "Patched: $shader"
            fi
          done

      - name: Cache Godot import
        uses: actions/cache@v4
        with:
          path: .godot/imported
          key: godot-import-${{ hashFiles('project.godot', 'scripts/**/*.gd', 'scenes/**/*.tscn') }}
          restore-keys: godot-import-

      - name: Generate export preset
        run: |
          cat > export_presets.cfg << 'PRESET'
          [preset.0]
          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="resources"
          include_filter=""
          exclude_filter="archive/*, tools/*, web-demo/*, docs/*, memory/*, .godot/*, *.md, *.log, *.bat, *.sh, *.py, .claude/*, .git/*, Assets/*, addons/merlin_llm/*, *.blend*, *.fbx, *.obj"
          export_path="web-export/index.html"
          encrypt_pck=false
          [preset.0.options]
          vram_texture_compression/for_desktop=true
          html/canvas_resize_policy=2
          html/focus_canvas_on_start=true
          html/export_icon=true
          progressive_web_app/enabled=false
          PRESET
          sed -i 's/^          //' export_presets.cfg

      - name: Import project
        timeout-minutes: 20
        run: |
          echo "=== Starting import (timeout 900s — godot hangs after DONE, this is expected) ==="
          timeout 900 godot --headless --path . --import --quit 2>&1 | tail -20 || echo "Import killed by timeout (expected — files are imported)"
          echo "=== Import step done ==="
          echo "=== Verify critical imports ==="
          ls .godot/imported/ 2>/dev/null | wc -l
          find .godot/imported -name "VT323*" 2>/dev/null | head -1
          find .godot/imported -name "translations*" 2>/dev/null | head -1
          echo "=== Import done ==="

      - name: Parse check
        timeout-minutes: 3
        continue-on-error: true
        run: |
          OUTPUT=$(timeout 60 godot --headless --editor --quit-after 10 --path . 2>&1 || true)
          echo "$OUTPUT" | grep "SCRIPT ERROR" || echo "No script errors"
          echo "::warning::Parse check is advisory only — export will attempt regardless"

      - name: Export Web
        timeout-minutes: 60
        run: |
          mkdir -p web-export
          echo "=== Starting Godot web export ==="
          ls -la /root/.local/share/godot/export_templates/ 2>/dev/null || echo "No templates dir"
          echo "=== Running export with monitoring ==="
          godot --headless --export-release "Web" web-export/index.html --path . &
          GPID=$!
          while kill -0 $GPID 2>/dev/null; do
            sleep 60
            FILES=$(find web-export/ -type f 2>/dev/null | wc -l)
            SIZE=$(du -sh web-export/ 2>/dev/null | cut -f1)
            echo "--- $(date +%H:%M:%S) files=$FILES size=$SIZE ---"
          done
          wait $GPID
          EXIT=$?
          echo "=== Godot exited with code $EXIT ==="
          ls -la web-export/
          if [ ! -f web-export/index.html ]; then
            echo "::error::Export failed — no index.html produced"
            exit 1
          fi
          echo "=== Export successful ==="
          # Vercel config: serve as static (no build step)
          cat > web-export/vercel.json << 'VCFG'
          {
            "buildCommand": "",
            "outputDirectory": ".",
            "framework": null,
            "headers": [
              { "source": "/(.*).wasm", "headers": [{"key": "Content-Type", "value": "application/wasm"}] },
              { "source": "/(.*).pck", "headers": [{"key": "Content-Type", "value": "application/octet-stream"}] }
            ]
          }
          VCFG
          sed -i 's/^          //' web-export/vercel.json

      - uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: web-export/
          retention-days: 7

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-export/

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: export-web
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: export-web
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-export
          path: web-export/
      - name: Diagnostic — check artifact
        run: |
          echo "=== Files in web-export/ ==="
          ls -la web-export/
          echo "=== File count ==="
          find web-export -type f | wc -l
          echo "=== Total size ==="
          du -sh web-export/
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Verify Vercel CLI
        run: vercel --version
      - name: Deploy game to Vercel
        working-directory: web-export
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -e
          CLEAN_TOKEN=$(echo "$VERCEL_TOKEN" | tr -d '[:space:]')
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json
          echo "=== project.json ==="
          cat .vercel/project.json
          echo "=== Token length: ${#CLEAN_TOKEN} ==="
          echo "=== Running vercel deploy ==="
          vercel deploy --prod --yes --force --token="$CLEAN_TOKEN"

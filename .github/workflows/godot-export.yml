name: Godot Export & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'tools/autodev/**'
      - '*.md'
      - 'memory/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  export-web:
    name: Export Godot Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container: barichello/godot-ci:4.5
    steps:
      - uses: actions/checkout@v4

      - name: Generate export preset
        run: |
          cat > export_presets.cfg << 'PRESET'
          [preset.0]
          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="web-export/index.html"
          encrypt_pck=false
          [preset.0.options]
          vram_texture_compression/for_desktop=true
          html/canvas_resize_policy=2
          html/focus_canvas_on_start=true
          html/export_icon=true
          progressive_web_app/enabled=false
          PRESET
          sed -i 's/^          //' export_presets.cfg

      - name: Import project
        run: godot --headless --path . --import --quit || true

      - name: Parse check
        run: |
          OUTPUT=$(godot --headless --editor --quit-after 10 --path . 2>&1 || true)
          ERRORS=$(echo "$OUTPUT" | grep -c "SCRIPT ERROR" || true)
          if [ "$ERRORS" -gt 0 ]; then echo "::error::$ERRORS script errors"; exit 1; fi

      - name: Export Web
        run: |
          mkdir -p web-export
          godot --headless --export-release "Web" web-export/index.html --path .
          # Verify export produced files
          if [ ! -f web-export/index.html ]; then
            echo "::error::Export failed — no index.html generated"
            exit 1
          fi
          echo "Export successful: $(ls -la web-export/)"

      - uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: web-export/
          retention-days: 7

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-export/

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: export-web
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: export-web
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-export
          path: web-export/
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: web-export
          vercel-args: '--prod'

name: Godot Export & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'tools/autodev/**'
      - '*.md'
      - 'memory/**'
      - '.claude/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "godot-export"
  cancel-in-progress: false

env:
  GODOT_VERSION: "4.5"

jobs:
  export-web:
    name: Export Godot Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container: barichello/godot-ci:4.5
    steps:
      - uses: actions/checkout@v4

      - name: Prepare project for headless CI
        run: |
          # Move export templates to expected location (required by barichello/godot-ci)
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable || true

          # Remove GDExtension (Windows-only DLL)
          rm -f addons/merlin_llm/merlin_llm.gdextension addons/merlin_llm/merlin_llm.gdextension.uid

          # Remove ALL editor plugins (MCP server hangs on port 9080)
          sed -i '/\[editor_plugins\]/,/^$/d' project.godot

          # Remove autoloads that block in headless (network servers, LLM)
          sed -i '/GameDebugServer=/d' project.godot
          sed -i '/MerlinAI=/d' project.godot

          # Patch shaders: remove hint_screen_texture (unsupported in headless)
          for shader in shaders/*.gdshader; do
            [ -f "$shader" ] && sed -i 's/hint_screen_texture, //g; s/hint_screen_texture//g' "$shader"
          done

          echo "=== Autoloads after cleanup ==="
          grep -A30 "^\[autoload\]" project.godot | head -20

      - name: Import resources
        continue-on-error: true
        run: godot --headless -v --import

      - name: Web Export
        run: |
          mkdir -v -p web-export
          godot --headless --verbose --export-release "Web" web-export/index.html
          ls -la web-export/

      - uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: web-export/
          retention-days: 7

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-export/

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: export-web
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-export
          path: web-export/
      - name: Deploy
        working-directory: web-export
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest
          CLEAN_TOKEN=$(echo "$VERCEL_TOKEN" | tr -d '[:space:]')
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json
          vercel deploy --prod --yes --force --token="$CLEAN_TOKEN"

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: export-web
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

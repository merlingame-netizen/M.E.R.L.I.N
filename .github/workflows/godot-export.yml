name: Godot Export & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'tools/autodev/mission-control/**'
      - '*.md'
      - 'memory/**'
  workflow_dispatch:

jobs:
  export-web:
    name: Export Godot Web Build
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.5
    steps:
      - uses: actions/checkout@v4
      - name: Import project
        run: |
          mkdir -p ~/.config/godot
          godot --headless --path . --import --quit || true
      - name: Parse check
        run: |
          OUTPUT=$(godot --headless --editor --quit-after 10 --path . 2>&1 || true)
          ERRORS=$(echo "$OUTPUT" | grep -c "SCRIPT ERROR" || true)
          if [ "$ERRORS" -gt 0 ]; then echo "::error::$ERRORS script errors"; exit 1; fi
      - name: Export Web
        run: |
          mkdir -p web-export
          godot --headless --export-release "Web" web-export/index.html --path . 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: web-export/
          retention-days: 7

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: export-web
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-export
          path: web-export/
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: web-export
          vercel-args: '--prod'

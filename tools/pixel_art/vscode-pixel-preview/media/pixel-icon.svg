<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- pixel grid -->
  <rect x="3" y="3" width="18" height="18" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- grid lines -->
  <line x1="9" y1="3" x2="9" y2="21" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
  <line x1="15" y1="3" x2="15" y2="21" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
  <line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
  <line x1="3" y1="15" x2="21" y2="15" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
  <!-- colored pixels (sprite hint) -->
  <rect x="9" y="3" width="6" height="6" fill="currentColor" opacity="0.7"/>
  <rect x="3" y="9" width="6" height="6" fill="currentColor" opacity="0.5"/>
  <rect x="9" y="9" width="6" height="6" fill="currentColor" opacity="0.9"/>
  <rect x="15" y="9" width="6" height="6" fill="currentColor" opacity="0.3"/>
  <rect x="9" y="15" width="6" height="6" fill="currentColor" opacity="0.6"/>
</svg>

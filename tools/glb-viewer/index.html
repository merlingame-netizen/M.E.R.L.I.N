<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔮 M.E.R.L.I.N. GLB Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:       #0d0d12;
    --sidebar:  #13131a;
    --border:   #2a2a3a;
    --accent:   #7c4dff;
    --teal:     #00e5c8;
    --gold:     #f0b429;
    --text:     #c8c8d8;
    --text-dim: #6a6a7a;
    --hover:    #1e1e2e;
    --active:   #252538;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: 220px; min-width: 160px; max-width: 320px;
    background: var(--sidebar); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar-header {
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--text-dim); text-transform: uppercase;
  }
  #sidebar-header span { color: var(--teal); }
  #asset-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  #asset-list::-webkit-scrollbar { width: 4px; }
  #asset-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .asset-group { margin-bottom: 2px; }
  .asset-group-label {
    padding: 4px 14px; font-size: 10px; font-weight: 600;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em;
    cursor: pointer; user-select: none;
  }
  .asset-group-label:hover { color: var(--text); }
  .asset-item {
    padding: 5px 14px 5px 24px; font-size: 12px; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text); transition: background 0.1s;
    border-left: 2px solid transparent;
  }
  .asset-item:hover { background: var(--hover); }
  .asset-item.active {
    background: var(--active);
    border-left-color: var(--accent);
    color: #fff;
  }
  .asset-item::before { content: '◆ '; font-size: 7px; color: var(--text-dim); }
  .asset-item.active::before { color: var(--teal); }

  /* Upload zone */
  #upload-zone {
    padding: 10px 14px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-dim);
  }
  #upload-input { display: none; }
  #upload-btn {
    width: 100%; padding: 6px; background: var(--hover); border: 1px dashed var(--border);
    border-radius: 4px; color: var(--text-dim); cursor: pointer; font-size: 11px;
    text-align: center; transition: all 0.15s;
  }
  #upload-btn:hover { border-color: var(--accent); color: var(--text); background: var(--active); }

  /* ── Viewport ── */
  #viewport { flex: 1; position: relative; overflow: hidden; }
  #canvas { width: 100%; height: 100%; display: block; }

  /* ── Toolbar ── */
  #toolbar {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; gap: 6px; align-items: center; pointer-events: none;
  }
  #toolbar > * { pointer-events: auto; }
  #asset-name {
    flex: 1; padding: 5px 10px; background: rgba(13,13,18,0.85);
    border: 1px solid var(--border); border-radius: 4px;
    font-size: 12px; color: var(--gold); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    backdrop-filter: blur(4px);
  }
  .tb-btn {
    padding: 5px 10px; background: rgba(13,13,18,0.85);
    border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-size: 11px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
    backdrop-filter: blur(4px);
  }
  .tb-btn:hover { border-color: var(--accent); color: #fff; }
  .tb-btn.active { border-color: var(--teal); color: var(--teal); background: rgba(0,229,200,0.08); }

  /* ── Info panel ── */
  #info {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(13,13,18,0.85); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 12px; font-size: 11px;
    color: var(--text-dim); line-height: 1.7; backdrop-filter: blur(4px);
    pointer-events: none;
  }
  #info span { color: var(--text); }

  /* ── Loading overlay ── */
  #loading {
    position: absolute; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; font-size: 13px; color: var(--text-dim);
  }
  #loading .spinner {
    width: 32px; height: 32px; border: 2px solid var(--border);
    border-top-color: var(--teal); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading.hidden { display: none; }

  /* ── Help ── */
  #help {
    position: absolute; bottom: 12px; right: 12px;
    background: rgba(13,13,18,0.85); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 12px; font-size: 10px;
    color: var(--text-dim); line-height: 1.8; backdrop-filter: blur(4px);
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">🔮 <span>GLB</span> Viewer</div>
  <div id="asset-list"><div style="padding:12px 14px;font-size:11px;color:var(--text-dim)">Chargement…</div></div>
  <div id="upload-zone">
    <input type="file" id="upload-input" accept=".glb,.gltf">
    <div id="upload-btn" onclick="document.getElementById('upload-input').click()">+ Ouvrir un GLB local</div>
  </div>
</div>

<!-- 3D Viewport -->
<div id="viewport">
  <canvas id="canvas"></canvas>

  <!-- Toolbar -->
  <div id="toolbar">
    <div id="asset-name">Aucun asset</div>
    <button class="tb-btn active" id="btn-texture" onclick="toggleTexture()">Vertex Color</button>
    <button class="tb-btn" id="btn-wire" onclick="toggleWireframe()">Wireframe</button>
    <button class="tb-btn" id="btn-bg" onclick="toggleBg()">Fond clair</button>
    <button class="tb-btn" id="btn-reset" onclick="resetCamera()">Reset cam</button>
  </div>

  <!-- Stats -->
  <div id="info">
    Polygones: <span id="stat-poly">—</span> &nbsp;|&nbsp;
    Vertices: <span id="stat-vert">—</span> &nbsp;|&nbsp;
    Taille: <span id="stat-size">—</span>
  </div>

  <!-- Help -->
  <div id="help">
    🖱 Orbiter &nbsp;|&nbsp; Scroll Zoom &nbsp;|&nbsp; Clic droit Pan
  </div>

  <!-- Loading -->
  <div id="loading" class="hidden">
    <div class="spinner"></div>
    <div id="loading-text">Chargement du modèle…</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "/web-demo/node_modules/three/build/three.module.js",
    "three/addons/": "/web-demo/node_modules/three/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';

// ── Scene setup ───────────────────────────────────────────────────────────────

const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d12);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
camera.position.set(3, 2, 3);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.1;
controls.maxDistance = 200;

// ── Lights ────────────────────────────────────────────────────────────────────

const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

const key = new THREE.DirectionalLight(0xfff8ee, 2.0);
key.position.set(5, 8, 6);
key.castShadow = true;
scene.add(key);

const fill = new THREE.DirectionalLight(0xaac8ff, 0.8);
fill.position.set(-4, 3, -4);
scene.add(fill);

const rim = new THREE.DirectionalLight(0x00e5c8, 0.4);
rim.position.set(0, -2, -6);
scene.add(rim);

// Grid helper (subtle)
const grid = new THREE.GridHelper(10, 20, 0x2a2a3a, 0x1e1e2a);
scene.add(grid);

// ── State ─────────────────────────────────────────────────────────────────────

let currentModel  = null;
let showWireframe = false;
let showTexture   = true;
let lightBg       = false;

// ── Resize ────────────────────────────────────────────────────────────────────

function onResize() {
  const vp = document.getElementById('viewport');
  const w  = vp.clientWidth;
  const h  = vp.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(onResize).observe(document.getElementById('viewport'));
onResize();

// ── Render loop ───────────────────────────────────────────────────────────────

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

// ── Load GLB ──────────────────────────────────────────────────────────────────

const loader = new GLTFLoader();

function setLoading(on, text = 'Chargement…') {
  const el = document.getElementById('loading');
  document.getElementById('loading-text').textContent = text;
  el.classList.toggle('hidden', !on);
}

function fitCamera(object) {
  const box    = new THREE.Box3().setFromObject(object);
  const center = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const fov    = camera.fov * (Math.PI / 180);
  const dist   = Math.abs(maxDim / Math.sin(fov / 2)) * 0.7;
  camera.position.set(center.x + dist * 0.6, center.y + dist * 0.5, center.z + dist * 0.6);
  controls.target.copy(center);
  grid.position.y = box.min.y;
  controls.update();
}

function countMesh(object) {
  let poly = 0, vert = 0;
  object.traverse(child => {
    if (child.isMesh && child.geometry) {
      const geo = child.geometry;
      vert += (geo.attributes.position?.count || 0);
      poly += (geo.index ? geo.index.count / 3 : vert / 3);
    }
  });
  return { poly: Math.round(poly), vert };
}

function applyMaterial(object) {
  object.traverse(child => {
    if (!child.isMesh) return;
    child.castShadow = true;
    child.receiveShadow = true;
    if (showWireframe) {
      child.material = new THREE.MeshBasicMaterial({ wireframe: true, color: 0x00e5c8 });
    }
    if (child.material) {
      if (Array.isArray(child.material)) {
        child.material.forEach(m => { if (m.wireframe !== undefined) m.wireframe = showWireframe; });
      } else {
        child.material.wireframe = showWireframe;
      }
    }
  });
}

window.loadGLB = function(url, name, size = '') {
  setLoading(true, `Chargement de ${name}…`);
  document.getElementById('asset-name').textContent = name;

  if (currentModel) { scene.remove(currentModel); currentModel = null; }

  loader.load(
    url,
    (gltf) => {
      currentModel = gltf.scene;
      scene.add(currentModel);
      applyMaterial(currentModel);
      fitCamera(currentModel);
      const { poly, vert } = countMesh(currentModel);
      document.getElementById('stat-poly').textContent = poly.toLocaleString('fr');
      document.getElementById('stat-vert').textContent = vert.toLocaleString('fr');
      document.getElementById('stat-size').textContent = size || '—';
      setLoading(false);
    },
    (xhr) => {
      const pct = Math.round((xhr.loaded / (xhr.total || 1)) * 100);
      document.getElementById('loading-text').textContent = `${name} — ${pct}%`;
    },
    (err) => {
      console.error(err);
      setLoading(false);
      document.getElementById('asset-name').textContent = '⚠ Erreur de chargement';
    }
  );
};

// ── Controls ──────────────────────────────────────────────────────────────────

window.toggleWireframe = function() {
  showWireframe = !showWireframe;
  document.getElementById('btn-wire').classList.toggle('active', showWireframe);
  if (currentModel) applyMaterial(currentModel);
};

window.toggleTexture = function() {
  showTexture = !showTexture;
  document.getElementById('btn-texture').classList.toggle('active', showTexture);
  ambient.intensity = showTexture ? 0.6 : 1.8;
  key.intensity     = showTexture ? 2.0 : 0;
  fill.intensity    = showTexture ? 0.8 : 0;
};

window.toggleBg = function() {
  lightBg = !lightBg;
  scene.background = new THREE.Color(lightBg ? 0xe8e8ee : 0x0d0d12);
  grid.visible = !lightBg;
  document.getElementById('btn-bg').textContent = lightBg ? 'Fond sombre' : 'Fond clair';
  document.getElementById('btn-bg').classList.toggle('active', lightBg);
};

window.resetCamera = function() {
  if (currentModel) fitCamera(currentModel);
};

// ── File upload ───────────────────────────────────────────────────────────────

document.getElementById('upload-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const size = file.size < 1024 * 1024
    ? `${Math.round(file.size / 1024)}KB`
    : `${(file.size / 1024 / 1024).toFixed(1)}MB`;
  window.loadGLB(url, file.name, size);

  // Mark active in sidebar (none — it's a custom file)
  document.querySelectorAll('.asset-item').forEach(el => el.classList.remove('active'));
});

// ── Asset list from server ────────────────────────────────────────────────────

async function buildAssetList() {
  const list = document.getElementById('asset-list');
  try {
    const res  = await fetch('/api/assets');
    const glbs = await res.json();

    if (!glbs.length) {
      list.innerHTML = '<div style="padding:12px 14px;font-size:11px;color:var(--text-dim)">Aucun GLB trouvé</div>';
      return;
    }

    // Group by folder
    const groups = {};
    for (const p of glbs) {
      const parts = p.split('/');
      const folder = parts.length > 2 ? parts.slice(0, -1).join('/') : 'root';
      if (!groups[folder]) groups[folder] = [];
      groups[folder].push({ path: p, name: parts[parts.length - 1] });
    }

    list.innerHTML = '';
    for (const [folder, assets] of Object.entries(groups)) {
      const label = folder.split('/').pop() || folder;
      const grp = document.createElement('div');
      grp.className = 'asset-group';

      const glabel = document.createElement('div');
      glabel.className = 'asset-group-label';
      glabel.textContent = `▸ ${label}`;
      grp.appendChild(glabel);

      for (const asset of assets) {
        const item = document.createElement('div');
        item.className = 'asset-item';
        item.textContent = asset.name.replace('.glb', '');
        item.title = asset.path;
        item.dataset.path = asset.path;
        item.onclick = () => {
          document.querySelectorAll('.asset-item').forEach(el => el.classList.remove('active'));
          item.classList.add('active');
          window.loadGLB('/' + asset.path, asset.name);
        };
        grp.appendChild(item);
      }
      list.appendChild(grp);
    }

    // Auto-load first asset if present
    const first = list.querySelector('.asset-item');
    if (first) first.click();

  } catch {
    list.innerHTML = '<div style="padding:12px 14px;font-size:11px;color:#f06">Serveur non démarré<br><small>node tools/glb-viewer/server.mjs</small></div>';
  }
}

buildAssetList();
</script>
</body>
</html>
